name: Refresh README assets

# Regenerates the self-hosted badges and star-history chart and commits them
# back to the repo on a schedule, so the README stays current without manual runs.
on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  workflow_dispatch: {}    # allows manual runs from the Actions tab

permissions:
  contents: write

# Never run two refreshes at once (avoids the push race that causes
# "non-fast-forward" rejections).
concurrency:
  group: refresh-readme
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate badges and star chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/badges.py
          python3 scripts/star_chart.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges star_history.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: auto-refresh badges and star chart"
          # Integrate any remote changes before pushing so we never reject
          # with a non-fast-forward error.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
